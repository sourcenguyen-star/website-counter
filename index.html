<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Counter</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 100px;
        }

        #visit-box {
            display: inline-block;
            margin-top: 40px;
            background: linear-gradient(135deg, #ff512f, #dd2476);
            padding: 20px 40px;
            border-radius: 60px;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <h1>🔥 Website của bạn</h1>

    <div id="visit-box">
        Lượt truy cập: <span id="counter">Đang tải...</span>
    </div>

    <script>
        // ĐỔI TÊN này nếu muốn (càng dài càng ít trùng)
        fetch('https://api.countapi.xyz/hit/nghingho-tiennguyen-2026/visits')
            .then(res => res.json())
            .then(data => {
                document.getElementById("counter").innerText = data.value;
            })
            .catch(err => {
                document.getElementById("counter").innerText = "Lỗi!";
                console.log(err);
            });
    </script>

</body>

</html>
